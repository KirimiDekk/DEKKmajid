<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Login - Dekk Gold Miner</title>
  <link rel="stylesheet" href="css/login.css">
  <link rel="icon" href="img/icon2.jpg">
  <script defer src="js/login.js"></script>
</head>
<body>

  <div class="login-container">
    <div class="logo">
      <img src="img/logo2.jpg" alt="Dekk Gold Miner Logo" width="100" height="100" 
           onerror="this.src='https://placehold.co/100x100?text=Logo'">
      <h1>Dekk Gold Miner</h1>
    </div>
    <h2>Login</h2>
    <p class="welcome-text">Welcome back! We missed you! Log in to your account.</p>

    <form id="login-form">
      <div class="input-group">
        <label>Username or Email</label>
        <input type="text" id="username" placeholder="Email or Username" autocomplete="username" required>
      </div>

      <div class="input-group">
        <label>Password <a href="#" id="forgotPasswordLink" class="forgot-password">Forgot password?</a></label>
        <div class="password-container">
          <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" required>
          <span class="toggle-password" id="togglePasswordBtn" role="button" aria-label="Show password">👁️</span>
        </div>
      </div>

      <div class="remember">
        <input type="checkbox" id="remember">
        <label for="remember">Remember me</label>
      </div>

      <button type="submit" class="login-btn">Login</button>
      <div id="error-message" class="error-message"></div>

      <p class="register-link">Don't have an account? <a href="register.html">Register</a></p>
    </form>
  </div>

  <!-- Forgot Password Modal -->
  <div id="forgotModal" class="modal">
    <div class="modal-content">
      <span class="close-modal">&times;</span>
      <h3>Reset Password</h3>
      <p>Enter your email address and we'll send you a password reset link.</p>
      <input type="email" id="resetEmail" placeholder="Your email address" class="modal-input">
      <button id="sendResetBtn" class="modal-btn">Send Reset Link</button>
      <div id="resetMessage" class="reset-message"></div>
    </div>
  </div>

  <!-- Toast container for notifications -->
  <div id="toast-container" class="toast-container"></div>

</body>
</html>
